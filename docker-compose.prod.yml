services:

  # ── Nginx: frontend + reverse proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── Node.js API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - NODE_ENV=production
      - PORT=4000
      - BANDEJA_STORAGE_PATH=/storage
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PROCESSOR_URL=http://processor:8000
      # API_BASE_URL: used by renderer to resolve video URLs for Remotion
      - API_BASE_URL=http://api:4000
    volumes:
      - bandeja-videos:/storage
    expose:
      - "4000"
    restart: unless-stopped

  # ── Python video processor ───────────────────────────────────────────────────
  processor:
    build:
      context: ./apps/processor
      dockerfile: Dockerfile
    # Override dev CMD: remove --reload, add workers
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      - PYTHONUNBUFFERED=1
      - BANDEJA_STORAGE_PATH=/storage
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - CONFIDENCE_THRESHOLD=0.7
    volumes:
      - bandeja-videos:/storage
    expose:
      - "8000"
    restart: unless-stopped

volumes:
  bandeja-videos:
    driver: local
    driver_opts:
      type: none
      o: bind
      # Set BANDEJA_STORAGE_PATH in your .env to the absolute path on the host
      # e.g. BANDEJA_STORAGE_PATH=/var/bandeja/videos
      device: ${BANDEJA_STORAGE_PATH}
