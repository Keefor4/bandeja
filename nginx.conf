events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript
                text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1000;

  # Increase buffer for large video proxy responses
  proxy_buffers         16 64k;
  proxy_buffer_size     64k;
  proxy_busy_buffers_size 128k;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API — proxied to Node.js container
    location /api/ {
      proxy_pass                  http://api:4000;
      proxy_http_version          1.1;
      proxy_set_header            Host $host;
      proxy_set_header            X-Real-IP $remote_addr;
      proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout          600s;
      proxy_send_timeout          600s;
      proxy_request_buffering     off;   # stream large uploads directly to API
      client_max_body_size        8g;
    }

    # Video storage — proxied to Node.js (served via express.static)
    location /storage/ {
      proxy_pass         http://api:4000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_buffering    off;    # stream video without buffering
      proxy_read_timeout 300s;
    }

    # SPA fallback — all other routes serve index.html
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
